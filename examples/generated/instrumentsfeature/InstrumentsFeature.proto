/* No description provided. */
service InstrumentsFeature {
  /* Get all registered laboratory instruments Returns: List of available instruments */
  rpc ListInstrumentsInstrumentsGet (sila2.org.silastandard.generator.instrumentsfeature.v1.ListInstrumentsInstrumentsGet_Parameters) returns (sila2.org.silastandard.generator.instrumentsfeature.v1.ListInstrumentsInstrumentsGet_Responses) {}
  /* Register a new laboratory instrument (admin only) Args: payload: Instrument details service: Instrument service instance _: Login context Returns: Created instrument */
  rpc RegisterNewInstrumentInstrumentsPost (sila2.org.silastandard.generator.instrumentsfeature.v1.RegisterNewInstrumentInstrumentsPost_Parameters) returns (sila2.org.silastandard.generator.instrumentsfeature.v1.RegisterNewInstrumentInstrumentsPost_Responses) {}
  /* Get detailed status of an instrument Args: instrument_id: ID of the instrument Returns: Instrument status with state and metadata */
  rpc GetInstrumentStatusInstrumentsInstrumentIdGet (sila2.org.silastandard.generator.instrumentsfeature.v1.GetInstrumentStatusInstrumentsInstrumentIdGet_Parameters) returns (sila2.org.silastandard.generator.instrumentsfeature.v1.GetInstrumentStatusInstrumentsInstrumentIdGet_Responses) {}
  /* Retire/delete an instrument from service (admin only) Args: instrument_id: ID of instrument to retire service: Instrument service instance _: Login context Returns: Retired instrument ID */
  rpc RetireInstrumentInstrumentsInstrumentIdDelete (sila2.org.silastandard.generator.instrumentsfeature.v1.RetireInstrumentInstrumentsInstrumentIdDelete_Parameters) returns (sila2.org.silastandard.generator.instrumentsfeature.v1.RetireInstrumentInstrumentsInstrumentIdDelete_Responses) {}
  /* Calibrate an instrument (admin only) Updates calibration timestamp and schedules next maintenance. Args: instrument_id: ID of instrument to calibrate service: Instrument service instance _: Login context Returns: Updated instrument with new calibration timestamp */
  rpc CalibrateInstrumentInstrumentsInstrumentIdCalibratePost (sila2.org.silastandard.generator.instrumentsfeature.v1.CalibrateInstrumentInstrumentsInstrumentIdCalibratePost_Parameters) returns (sila2.org.silastandard.generator.instrumentsfeature.v1.CalibrateInstrumentInstrumentsInstrumentIdCalibratePost_Responses) {}
}

